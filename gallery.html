<!-- hides <body> (see html.pt-hide in style.css) before first paint, so
     arriving here via the cross-page fade in js/page-transition.js doesn't
     flash the fully-opaque page before fading in -->
<script>document.documentElement.classList.add('pt-hide');</script>

<!-- preloader: full-screen takeover shown until the first-screen photos
     have loaded (or the safety timeout fires) — see
     js/gallery-preloader.js, a self-contained match for index.html's -->

  <span id="preloader-brand">Vin Shturmer</span>
  <span id="preloader-percent">0%</span>
  <div id="preloader-photo"></div>
</div>

<!-- header, matching index.html — plain links back to the main page's
     sections since this is its own top-level page, not a scroll target -->

    <a href="index.html">Collection</a>
    <a href="index.html#concept">Concept</a>
